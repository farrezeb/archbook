########################################################################################
# CONFIGURAÇÃO HYPRLAND - MACBOOK A1278 (v0.53.3)
########################################################################################

# --- Variáveis de Ambiente ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland

# Interface e Modo Escuro
env = GTK_THEME,Adwaita:dark
env = QT_STYLE_OVERRIDE,adwaita-dark
env = GTK_FONT_NAME,SF Pro Text 10

# Importa as cores do Pywal
source = /home/farrezeb/.cache/wal/colors-hyprland.conf

# --- Configurações Misc ---

render {
    new_render_scheduling = true
    direct_scanout = false
}

misc {
    vfr = true
    vrr = 0
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(foot)$

}

# --- Monitores ---
monitor = LVDS-1,preferred,0x0,1

# --- Variáveis de Programas ---
$mod = SUPER
$terminal = foot
$menu = fuzzel
$fileManager = foot lf
$browser = qutebrowser

# --- Entrada (Trackpad MacBook) ---
input {
    kb_layout = ch
    kb_variant = fr_mac
    kb_model = apple_laptop
    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
}

# Ambiente Wayland
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# --- Inicialização (Exec-Once) ---

# Interface
exec-once = awww-daemon
exec-once = waybar > /dev/null 2>&1
exec-once = dunst

# 1. Garante que o Foot mude de cor com o wallpaper ao iniciar
exec-once = cat ~/.cache/wal/sequences

# Gerenciamento de energia e suspensão (bateria/AC)
exec-once = ~/.local/bin/power-monitor.sh > /dev/null 2>&1

# --- Aparência e Layout ---
general {
    gaps_in = 5                    # pequenas margens internas
    gaps_out = 6                   # margens externas levemente maiores
    border_size = 2                # borda um pouco mais visível
    col.active_border = $color0    # cor principal do Pywal
    col.inactive_border = $color7  # cor de destaque suave
    layout = master                # dwindle ou master

}

decoration {
    rounding = 8              # cantos arredondados modernos
    active_opacity = 1.0       # janela ativa totalmente visível
    inactive_opacity = 0.7     # janelas inativas suavizadas
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.15        # destaca mais a janela ativa
    dim_special = 0.3

# Desliga as sombras completamente
shadow {
    enabled = false
}

blur {
    enabled = false

    }
}

animations {
    enabled = yes
    bezier = instant, 0.0, 0.0, 1.0, 1.0  # Linear para menos carga
    animation = windows, 1, 3, instant     # Mais rápido
    animation = windowsOut, 1, 2, instant, popin 90%
    animation = border, 1, 5, instant
    animation = fade, 1, 3, instant
    animation = workspaces, 1, 2, instant, slide
}

dwindle {
    pseudotile = true           # Janelas pequenas ficam flutuantes
    preserve_split = true       # Mantém direção do split
}

#windowrule {
#    name = suppress-maximize-events
#    match:class = .*
#    suppress_event = maximize
#}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_on_top = true
    mfact = 0.6
    new_status = master
    orientation = left
}

# Regra para ferramentas de seleção (ex: slurp/screenshots)
layerrule {
    name = no_anim_for_selection
    no_anim = on
    match:namespace = selection
}

# --- Atalhos de Teclado ---
bind = $mod, RETURN, exec, $terminal
bind = $mod, d, exec, $menu
bind = $mod, e, exec, $fileManager
bind = $mod, q, killactive

# Abre o monitor de sistema flutuando no meio da tela (F4 do MacBook)
bind = , XF86LaunchB, exec, [float;center;size 900 600] $terminal -e btop

# Menu de saída simplificado
bind = $mod SHIFT, M, exec, echo -e "Sair\nReiniciar\nDesligar" | fuzzel -d -p "Escolha: " | xargs -I{} bash -c "case {} in 'Sair') hyprctl dispatch exit ;; 'Reiniciar') reboot ;; 'Desligar') poweroff ;; esac"

# Captura de Tela Inteira (Cmd + Shift + 3) - Qualidade Máxima (PNG Lossless)
bind = CONTROL SHIFT, 3, exec, grim -l 0 ~/media/Capturas\ de\ tela/$(date +'%Y%m%d_%H%M%S').png && notify-send "📸 Screenshot" "Tela cheia salva em alta qualidade"

# Captura de Área Selecionada (Cmd + Shift + 4) - Qualidade Máxima (PNG Lossless)
bind = CONTROL SHIFT, 4, exec, grim -l 0 -g "$(slurp)" ~/media/Capturas\ de\ tela/$(date +'%Y%m%d_%H%M%S').png && notify-send "📸 Screenshot" "Área salva em alta qualidade"

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Mover Janelas
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

#workspace = 1, layout:master
#workspace = 2, layout:master
#workspace = 3, layout:master
#workspace = 4, layout:dwindle
#workspace = 5, layout:dwindle
#workspace = 6, layout:dwindle
#workspace = 7, layout:monocle
#workspace = 8, layout:monocle
#workspace = 9, layout:scroll
#workspace = 10, layout:scroll

gesture = 3, horizontal, workspace

bind = $mod, left, workspace, e-1
bind = $mod, right, workspace, e+1

# Trocar entre janelas
bind = $mod, TAB, cyclenext, prev  # cycle prev pra ir "pra trás"
bind = $mod SHIFT, TAB, cyclenext

# Promover a janela atual para Master (Principal)
bind = $mod, SPACE, layoutmsg, swapwithmaster

# Mudar o foco entre as janelas (alternativa ao TAB)
bind = $mod, j, layoutmsg, cyclenext
bind = $mod, k, layoutmsg, cycleprev

# Troca a janela ativa com a janela na direção indicada
bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, movefocus, u
bind = SUPER SHIFT, down, movefocus, d

# Move focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move window focus left, movefocus, l
bindd = SUPER, RIGHT, Move window focus right, movefocus, r
bindd = SUPER, UP, Move window focus up, movefocus, u
bindd = SUPER, DOWN, Move window focus down, movefocus, d

# --- Modo de Redimensionamento com Feedback Visual ---
bind = $mod, r, submap, resize

submap = resize

# Quando o submap RESIZE estiver ativo:
# Muda a cor da borda para amarelo imediatamente ao pressionar as setas ou entrar
exec = hyprctl keyword col.active_border "rgba(fabd2fee) rgba(fe8019ee) 45deg"

# Redimensionar com Setas
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20

# Voltar ao normal e RESTAURAR a cor original do Pywal ($color1)
bind = , escape, submap, reset
bind = , escape, exec, hyprctl keyword col.active_border "$color1"
bind = , RETURN, submap, reset
bind = , RETURN, exec, hyprctl keyword col.active_border "$color1"
submap = reset

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Teclas de Hardware MacBook ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbd_backlight set 10%+
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbd_backlight set 10%-

# Volume limitado a 100
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+

bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Controle de mídia para iPhone/Spotify/Navegador
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Suspensão e bloqueio
bind = $mod SHIFT, L, exec, /usr/local/bin/lockscreen
bind = $mod SHIFT, W, exec, ~/.local/bin/random_wall.sh

# Bind pra hyprpicker
bind = $mod, P, exec, hyprpicker -a

# Torna a janela flutuante e centraliza com um único atalho
bind = $mod SHIFT, C, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow

# Control tiling
bind = $mod SHIFT, J, layoutmsg, togglesplit  # ATUALIZADO v0.54.0
bindd = $mod SHIFT, T, Toggle window floating/tiling, togglefloating,
bindd = $mod SHIFT, F, Full screen, fullscreen, 0
bindd = $mod ALT, F, Full width, fullscreen, 1

# Reseta o tamanho da área Master para exatamente 50% da largura
bind = $mod, f, splitratio, exact 0.5

# Ajustar o tamanho da divisão entre Master e Slave (Pilha)
binde = $mod, l, splitratio, 0.05
binde = $mod, h, splitratio, -0.05

# Control scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Toggle groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# Float LocalSend and fzf file picker
windowrule = float on, match:class (Share|localsend)
windowrule = center on, match:class (Share|localsend)

# Abre o Bluetooth sob demanda (Super + B)
bind = $mod, b, exec, sudo systemctl start bluetooth && hyprctl dispatch exec "[float;center;size 800 500]" blueman-manager

# Desliga o Bluetooth para economizar bateria (Super + Shift + B)
bind = $mod SHIFT, B, exec, sudo systemctl stop bluetooth


# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
#bindd = SUPER SHIFT, C, Calendar, exec,  "https://app.hey.com/calendar/weeks/"
#bindd = SUPER SHIFT, E, Email, exec,  "https://app.hey.com"
#bindd = SUPER SHIFT ALT, G, WhatsApp, exec,  "https://web.whatsapp.com/"
#bindd = SUPER SHIFT CTRL, G, Google Messages, exec,  "https://messages.google.com/web/conversations"

bindd = SUPER SHIFT, H, HubSpot, exec, hubspot-qute
bindd = SUPER SHIFT, X, X Compose, exec, xcompose-qute

# Transforma janela ativa em flutuante + pequena + centraliza (pra facilitar arrastar)
bind = $mod, n, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 43% && hyprctl dispatch centerwindow
