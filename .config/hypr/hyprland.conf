########################################
# HYPRLAND 0.54.3 - MACBOOK A1278
# CORRIGIDO: 2026-04-05
########################################

# --- Variáveis de Ambiente ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland

# Interface e Modo Escuro
env = GTK_THEME,Adwaita:dark
env = QT_STYLE_OVERRIDE,adwaita-dark
env = GTK_FONT_NAME,SF Pro Text 10

# Importa as cores do Pywal
source = /home/farrezeb/.cache/wal/colors-hyprland.conf

# --- Render ---
render {
    direct_scanout = false
}

# --- Misc ---
misc {
    vfr = true
    vrr = 0
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(foot)$
}

# --- Monitores ---
monitor = LVDS-1,preferred,0x0,1

# ============================================
# VARIÁVEIS DE PROGRAMAS (MOVIDO PARA CÁ!)
# ============================================
# DEVE vir antes de qualquer bind que use $mod

$mod = SUPER
$terminal = foot
$menu = fuzzel
$fileManager = foot lf
$browser = qutebrowser

# --- Workspaces com Layouts Específicos ---
workspace = 1, layout:master
workspace = 2, layout:master
workspace = 3, layout:master
workspace = 4, layout:dwindle
workspace = 5, layout:dwindle
workspace = 6, layout:dwindle
workspace = 7, layout:monocle
workspace = 8, layout:monocle
workspace = 9, layout:scroll
workspace = 10, layout:scroll

# ============================================
# SCROLL LAYOUT - SEM CONFIGURAÇÃO POSSÍVEL
# ============================================

# --- Entrada (Trackpad MacBook) ---
input {
    kb_layout = ch
    kb_variant = fr_mac
    kb_model = apple_laptop

    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
}

# --- Inicialização ---
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Interface e utilitários
exec-once = awww-daemon
exec-once = waybar > /dev/null 2>&1
exec-once = dunst
exec-once = cat ~/.cache/wal/sequences

# Gerenciamento de energia
exec-once = ~/.local/bin/power-monitor.sh > /dev/null 2>&1

# --- Aparência e Layout ---
general {
    gaps_in = 5
    gaps_out = 6
    border_size = 2
    col.active_border = $color0
    col.inactive_border = $color7
    layout = master
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.7
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.3

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

# --- Animações Instantâneas ---
animations {
    enabled = yes
    bezier = instant, 0.0, 0.0, 1.0, 1.0

    animation = windows, 1, 3, instant
    animation = windowsOut, 1, 2, instant, popin 90%
    animation = border, 1, 5, instant
    animation = fade, 1, 3, instant
    animation = workspaces, 1, 2, instant, slide
}

# --- Configurações de Layouts ---

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_on_top = true
    mfact = 0.6
    new_status = master
    orientation = left
}

# ============================================
# REGRAS DE JANELA
# ============================================

windowrule = match:class ^(Share|localsend)$, float on
windowrule = match:class ^(Share|localsend)$, center on

# ============================================
# REGRAS DE LAYER
# ============================================

layerrule = match:namespace ^selection$, no_anim on
layerrule = match:namespace ^hyprpicker$, no_anim on

# ============================================
# ATALHOS DE TECLADO
# ============================================

# Básicos
bind = $mod, RETURN, exec, $terminal
bind = $mod, d, exec, $menu
bind = $mod, e, exec, $fileManager
bind = $mod, q, killactive

# Monitor de sistema (F4 do MacBook)
bind = , XF86LaunchB, exec, [float;center;size 900 600] $terminal -e btop

# Menu de saída
bind = $mod SHIFT, M, exec, echo -e "Sair\nReiniciar\nDesligar" | fuzzel -d -p "Escolha: " | xargs -I{} bash -c "case {} in 'Sair') hyprctl dispatch exit ;; 'Reiniciar') reboot ;; 'Desligar') poweroff ;; esac"

# Capturas de tela
bind = CONTROL SHIFT, 3, exec, grim -l 0 ~/media/Capturas\ de\ tela/$(date +'%Y%m%d_%H%M%S').png && notify-send "      Screenshot" "Tela cheia"
bind = CONTROL SHIFT, 4, exec, grim -l 0 -g "$(slurp)" ~/media/Capturas\ de\ tela/$(date +'%Y%m%d_%H%M%S').png && notify-send "      Screenshot" "Área salva"

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Mover janelas entre workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Navegação
bind = $mod, left, workspace, e-1
bind = $mod, right, workspace, e+1
bind = $mod, TAB, cyclenext, prev
bind = $mod SHIFT, TAB, cyclenext

# Gestos de workspace (trackpad)
gesture = 3, horizontal, workspace

# Foco e movimentação de janelas
bind = $mod, j, layoutmsg, cyclenext
bind = $mod, k, layoutmsg, cycleprev
bind = $mod, SPACE, layoutmsg, swapwithmaster

# Mover janelas (direções)
bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, movefocus, u
bind = SUPER SHIFT, down, movefocus, d

# Foco com setas
bindd = SUPER, LEFT, Move window focus left, movefocus, l
bindd = SUPER, RIGHT, Move window focus right, movefocus, r
bindd = SUPER, UP, Move window focus up, movefocus, u
bindd = SUPER, DOWN, Move window focus down, movefocus, d

# ============================================
# KEYBINDS ESPECÍFICOS PARA SCROLL LAYOUT
# ============================================
# Funcionam apenas em workspaces com layout:scroll

# Navegação entre colunas
bind = $mod, period, layoutmsg, move +col      # próxima coluna
bind = $mod, comma, layoutmsg, move -col       # coluna anterior

# Trocar colunas de lugar
bind = $mod SHIFT, period, layoutmsg, swapcol r
bind = $mod SHIFT, comma, layoutmsg, swapcol l

# Redimensionar coluna (cycle entre widths: 0.333, 0.5, 0.666)
bind = $mod, equal, layoutmsg, colresize +conf
bind = $mod, minus, layoutmsg, colresize -conf

# Ajustar todas as colunas para caber na tela
bind = $mod, w, layoutmsg, fit visible

# ============================================
# CONTROLE DE JANELAS
# ============================================

bind = $mod SHIFT, J, layoutmsg, togglesplit
bindd = $mod SHIFT, T, Toggle window floating/tiling, togglefloating
bindd = $mod SHIFT, F, Full screen, fullscreen, 0
bindd = $mod ALT, F, Full width, fullscreen, 1

bind = $mod, f, splitratio, exact 0.5
binde = $mod, l, splitratio, 0.05
binde = $mod, h, splitratio, -0.05

bind = $mod SHIFT, C, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow
bind = $mod, n, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 43% && hyprctl dispatch centerwindow

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Grupos de janelas
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

# ============================================
# MODO DE REDIMENSIONAMENTO (Submap)
# ============================================

bind = $mod, r, submap, resize

submap = resize

exec = hyprctl keyword col.active_border "rgba(fabd2fee) rgba(fe8019ee) 45deg"

binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20

bind = , escape, submap, reset
bind = , escape, exec, hyprctl keyword col.active_border "$color1"
bind = , RETURN, submap, reset
bind = , RETURN, exec, hyprctl keyword col.active_border "$color1"

submap = reset

# ============================================
# MOUSE
# ============================================

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ============================================
# TECLAS DE HARDWARE MACBOOK
# ============================================

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbd_backlight set 10%+
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbd_backlight set 10%-

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Bloqueio e wallpaper
bind = $mod SHIFT, L, exec, /usr/local/bin/lockscreen
bind = $mod SHIFT, W, exec, ~/.local/bin/random_wall.sh

# Hyprpicker
bind = $mod, P, exec, hyprpicker -a

# Bluetooth
bind = $mod, b, exec, sudo systemctl start bluetooth && hyprctl dispatch exec "[float;center;size 800 500]" blueman-manager
bind = $mod SHIFT, B, exec, sudo systemctl stop bluetooth

# Binds personalizados
bindd = SUPER SHIFT, H, HubSpot, exec, hubspot-qute
bindd = SUPER SHIFT, X, X Compose, exec, xcompose-qute
